<mat-form-field class="example-form-field" appearance="fill">
    <mat-label>Find a quote by author, work, tags or simply keyword...</mat-label>
    <input matInput type="text" [(ngModel)]="valueToFind">
    <button *ngIf="valueToFind" matSuffix mat-icon-button aria-label="Clear" (click)="valueToFind=''">
        <mat-icon>close</mat-icon>
    </button>
</mat-form-field>

<mat-card class="example-card">
    <mat-card-title>
        Farid Dieck
        <button mat-icon-button [matMenuTriggerFor]="menu" style="float: right;">
            <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #menu="matMenu">
            <button mat-menu-item>
                <mat-icon>edit</mat-icon>
                <span>Edit</span>
            </button>
            <button mat-menu-item>
                <mat-icon>remove_circle</mat-icon>
                <span>Delete</span>
            </button>
        </mat-menu>
    </mat-card-title>
    <mat-card-subtitle>Para ti</mat-card-subtitle>
    <mat-card-content>
        <p>No se puede modificar la conducta de quien no ve un problema en ella.</p>
    </mat-card-content>
    <mat-divider inset></mat-divider>
    <mat-card-footer class="example-card-footer">
        <mat-chip-list aria-label="Fish selection">
            <mat-chip color="primary" selected>Conducta Humana</mat-chip>
            <mat-chip color="primary" selected>Amor propio</mat-chip>
        </mat-chip-list>
    </mat-card-footer>
</mat-card>

<div class="new-quote-button">
    <button mat-fab color="primary">
        <mat-icon>add</mat-icon>
    </button>
</div>
